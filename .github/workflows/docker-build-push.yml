# 在 GitHub 上构建 LTX-2 RunPod 镜像并推送（无需本地 Docker）
# 密钥：GitHub repo → Settings → Secrets and variables → Actions

name: Build and Push Docker Image

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 始终推送到 GitHub Container Registry（无需额外密钥）
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push to GHCR
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/ltx2-worker:latest
            ghcr.io/${{ github.repository_owner }}/ltx2-worker:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

      - name: Verify LTX2 import in image
        run: |
          docker pull ghcr.io/${{ github.repository_owner }}/ltx2-worker:latest
          docker run --rm ghcr.io/${{ github.repository_owner }}/ltx2-worker:latest python -c "from diffusers.pipelines.ltx2 import LTX2Pipeline; from diffusers.pipelines.ltx2.export_utils import encode_video; print('LTX2 import OK')"

      # 可选：同时推送到 Docker Hub（需在 Settings → Variables 添加 DOCKERHUB_USERNAME，Secrets 添加 DOCKERHUB_TOKEN）
      - name: Login to Docker Hub
        if: vars.DOCKERHUB_USERNAME != ''
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push to Docker Hub
        if: vars.DOCKERHUB_USERNAME != ''
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ vars.DOCKERHUB_USERNAME }}/ltx2-worker:latest
            ${{ vars.DOCKERHUB_USERNAME }}/ltx2-worker:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
